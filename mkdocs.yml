site_name: Salesforce ORM
site_url: https://berat-dzhevdetov.github.io/salesforce-connector/
site_description: A TypeScript ORM library for Salesforce with an ActiveRecord-style interface
site_author: Berat Yuseinov

repo_name: Berat-Dzhevdetov/salesforce-connector
repo_url: https://github.com/Berat-Dzhevdetov/salesforce-connector

theme:
  name: material
  palette:
    # Light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate

  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true

plugins:
  - search

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - Configuration: getting-started/configuration.md
      - Quick Start: getting-started/quick-start.md
  - Models:
      - Defining Models: models/defining-models.md
      - Model Generation (CLI): models/model-generation.md
      - Field Types: models/field-types.md
  - Querying:
      - Lambda Queries (Recommended): querying/lambda-queries.md
      - Basic Queries: querying/basic-queries.md
      - Advanced Queries: querying/advanced-queries.md
      - Pagination: querying/pagination.md
      - Relationships & Subqueries: querying/relationships.md
  - CRUD Operations:
      - Creating Records: crud/creating.md
      - Reading Records: crud/reading.md
      - Updating Records: crud/updating.md
      - Deleting Records: crud/deleting.md
  - Advanced Topics:
      - Lifecycle Hooks (Observers): advanced/observers.md
      - Closure Variables Deep Dive: advanced/closure-variables.md
      - Error Handling: advanced/error-handling.md
      - Salesforce Governor Limits: advanced/governor-limits.md
  - CLI Tools:
      - CLI Commands Reference: cli/commands.md
      - Authentication Setup: cli/authentication.md
      - Scaffolding Guide: cli/scaffolding.md
  - Reference:
      - Migration Guide: migration-guide.md
      - Lambda Model (Legacy): lambda-model.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Berat-Dzhevdetov/salesforce-connector
    - icon: fontawesome/brands/npm
      link: https://www.npmjs.com/package/javascript-salesforce-connector

copyright: Copyright &copy; 2026 Berat Yuseinov
